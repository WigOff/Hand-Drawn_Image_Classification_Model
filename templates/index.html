<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Recognition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        canvas {
            border: 3px solid #667eea;
            border-radius: 10px;
            cursor: crosshair;
            background: #f8f9fa;
            max-width: 100%;
            height: auto;
        }
        
        .canvas-wrapper {
            overflow-x: auto;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="card shadow-lg">
                    <div class="card-body p-4">
                        <h1 class="card-title text-center mb-4">Draw Something!</h1>
                        
                        <div class="canvas-wrapper mb-4">
                            <canvas id="myCanvas" width="800" height="500"></canvas>
                        </div>
                        
                        <div class="row g-3 mb-3">
                            <div class="col-12 col-md-6 col-lg-3">
                                <label class="form-label">Color</label>
                                <input type="color" class="form-control form-control-color" id="colorPicker" value="#000000" title="Choose your color">
                            </div>
                            
                            <div class="col-12 col-md-6 col-lg-4">
                                <label class="form-label">Brush Size: <span id="sizeDisplay" class="badge bg-primary">5</span></label>
                                <input type="range" class="form-range" id="brushSize" min="1" max="50" value="5">
                            </div>
                            
                            <div class="col-12 col-md-6 col-lg-2">
                                <label class="form-label d-block">&nbsp;</label>
                                <button class="btn btn-primary w-100" onclick="clearCanvas()">Clear Canvas</button>
                            </div>
                            
                            <div class="col-12 col-md-6 col-lg-3">
                                <label class="form-label d-block">&nbsp;</label>
                                <button class="btn btn-success w-100" onclick="downloadCanvas()">Download</button>
                            </div>
                        </div>
                        
                        <p class="text-muted text-center mb-0">
                            <small>Click and drag to draw on the canvas</small>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const sizeDisplay = document.getElementById('sizeDisplay');
        
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        
        brushSize.addEventListener('input', (e) => {
            sizeDisplay.textContent = e.target.value;
        });
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
            isDrawing = true;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const currentX = touch.clientX - rect.left;
            const currentY = touch.clientY - rect.top;
            drawLine(lastX, lastY, currentX, currentY);
            lastX = currentX;
            lastY = currentY;
        });
        
        canvas.addEventListener('touchend', stopDrawing);
        
        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        }
        
        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const currentX = e.clientX - rect.left;
            const currentY = e.clientY - rect.top;
            drawLine(lastX, lastY, currentX, currentY);
            lastX = currentX;
            lastY = currentY;
        }
        
        function drawLine(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }
        
        function stopDrawing() {
            isDrawing = false;
        }
        
        function clearCanvas() {
            if (confirm('Are you sure you want to clear the canvas?')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        function downloadCanvas() {
            const link = document.createElement('a');
            link.download = 'canvas-drawing.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
